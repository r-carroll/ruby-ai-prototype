# fly.toml app configuration file generated for Sentiment Omikuji

app = "sentiment-omikuji"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  RAILS_ENV = "production"
  RAILS_LOG_TO_STDOUT = "true"
  RAILS_SERVE_STATIC_FILES = "true"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]
  
  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "omikuji_data"
  destination = "/rails/storage"

[deploy]
  release_command = "./bin/rails db:prepare"

[[services]]
  internal_port = 8080
  protocol = "tcp"
  
  [[services.http_checks]]
    interval = "10s"
    grace_period = "300s" # Give it 5 minutes to load models
    method = "get"
    path = "/up"
    protocol = "http"
    timeout = "5s"

