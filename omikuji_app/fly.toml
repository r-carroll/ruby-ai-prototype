# fly.toml app configuration file generated for Sentiment Omikuji

app = "sentiment-omikuji"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  RAILS_ENV = "production"
  RAILS_LOG_TO_STDOUT = "true"
  RAILS_SERVE_STATIC_FILES = "true"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "omikuji_data"
  destination = "/rails/storage"

[deploy]
  release_command = "./bin/rails db:prepare"
